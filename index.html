<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversión Sostenible en Latinoamérica - Presentación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #1B4332;
            --mid-green: #2D6A4F;
            --light-green: #74C69D;
            --white: #FFFFFF;
            --bg-light: #F8F9FA;
            --gold: #F4A261;
            --gold-soft: #FFFBF5;
            --text-main: #333333;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: #222;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Contenedor de Slides */
        .slider-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-light);
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            padding: 4rem;
            background-color: var(--white);
            overflow: hidden;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        /* Fondos con Imagen */
        .slide-image-bg {
            background-size: cover;
            background-position: center;
            position: relative;
            color: var(--white) !important;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(27, 67, 50, 0.85);
            z-index: 1;
        }

        .content-relative {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Tipografía */
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .title-large { font-size: 4rem; margin-bottom: 1rem; line-height: 1.1; }
        .subtitle { font-size: 1.8rem; font-weight: 300; margin-bottom: 2rem; }
        .header-label { 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.9rem; 
            color: var(--gold); 
            margin-bottom: 1rem;
            display: block;
            font-weight: 600;
        }
